<!DOCTYPE html>
<html>
<head>
    <title>School Portal Login</title>
</head>
<body>

<h2>Login</h2>

<form method="post" action="/login">
    <div>
        Username:
        <input type="text" name="username">
    </div>

    <div>
        Password:
        <input type="password" name="password">
    </div>

    <button type="submit">Login</button>
</form>

</body>
</html>
