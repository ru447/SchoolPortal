<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>ASAS - Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 p-0">
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <h2 class="mb-4">
                <i class="bi bi-speedometer2"></i>
                Admin Dashboard
            </h2>

            <div class="row">

                <div class="col-lg-3 col-md-6 mb-4">

                    <div class="card shadow border-0">

                        <div class="card-body text-center">

                            <i class="bi bi-people-fill display-4 text-primary"></i>

                            <h5 class="mt-3">Students</h5>

                            <h2>0</h2>

                        </div>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6 mb-4">

                    <div class="card shadow border-0">

                        <div class="card-body text-center">

                            <i class="bi bi-person-workspace display-4 text-success"></i>

                            <h5 class="mt-3">Teachers</h5>

                            <h2>0</h2>

                        </div>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6 mb-4">

                    <div class="card shadow border-0">

                        <div class="card-body text-center">

                            <i class="bi bi-book-half display-4 text-warning"></i>

                            <h5 class="mt-3">Subjects</h5>

                            <h2>0</h2>

                        </div>

                    </div>

                </div>

                <div class="col-lg-3 col-md-6 mb-4">

                    <div class="card shadow border-0">

                        <div class="card-body text-center">

                            <i class="bi bi-building display-4 text-danger"></i>

                            <h5 class="mt-3">Classes</h5>

                            <h2>0</h2>

                        </div>

                    </div>

                </div>

            </div>

            <div class="card shadow border-0 mt-3">

                <div class="card-header bg-primary text-white">
                    Quick Actions
                </div>

                <div class="card-body">

                    <button class="btn btn-primary me-2">
                        <i class="bi bi-person-plus"></i>
                        Add Student
                    </button>

                    <button class="btn btn-success me-2">
                        <i class="bi bi-person-workspace"></i>
                        Add Teacher
                    </button>

                    <button class="btn btn-warning me-2">
                        <i class="bi bi-book"></i>
                        Add Subject
                    </button>

                    <button class="btn btn-danger">
                        <i class="bi bi-building-add"></i>
                        Add Class
                    </button>

                </div>

            </div>

            <!-- Footer -->
            <div th:replace="~{fragments/footer :: footer}"></div>

        </div>

    </div>

</div>

</body>
</html>
